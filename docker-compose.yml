name: querylens

services:
  backend:
    build:
      context: ./backend
    environment:
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped
